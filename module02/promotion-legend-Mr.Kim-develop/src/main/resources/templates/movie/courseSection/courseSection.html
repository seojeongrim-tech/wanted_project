<!-- ===========================
     MAIN CONTENT
=========================== -->
<div class="main">

  <!-- Decorative BG Letter -->
  <span class="bg-letter">E</span>

  <div class="content-inner">

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header__left">
        <span class="page-header__sub">MANAGEMENT ADMINISTRATION</span>
        <h1 class="page-header__title">코스 &amp; 섹션 등록</h1>
      </div>
    </div>

    <!-- Forms Wrapper -->
    <div class="forms-wrapper">

      <!-- ==================
           COURSE FORM CARD
      ================== -->
      <div class="card card--course">
        <div class="card__header">
          <div class="card__header-icon card__header-icon--gold"></div>
          <span class="card__title">코스 등록</span>
        </div>

        <div class="card__body">

          <!-- Course Name -->
          <div class="form-field">
            <label class="form-label form-label--gold">COURSE NAME</label>
            <div class="form-input-wrapper">
              <input
                      id="course-title"
                      class="form-input"
                      type="text"
                      placeholder="코스명을 입력하세요"
              />
            </div>
          </div>

          <!-- Description -->
          <div class="form-field">
            <label class="form-label form-label--gold">DESCRIPTION</label>
            <div class="form-input-wrapper form-input-wrapper--textarea">
                            <textarea
                                    id="course-description"
                                    class="form-textarea"
                                    placeholder="코스에 대한 설명을 입력하세요"
                            ></textarea>
            </div>
          </div>

          <!-- Due Date -->
          <div class="form-field">
            <label class="form-label form-label--gold">DUE DATE (일)</label>
            <div class="form-input-wrapper">
              <input
                      id="course-duedate"
                      class="form-input"
                      type="number"
                      min="1"
                      placeholder="수강 기간을 입력하세요 (예: 30)"
              />
            </div>
          </div>

          <!-- Submit Button -->
          <button class="btn btn--course" onclick="registerCourse()">
            <span class="btn__label">코스 등록하기</span>
          </button>

        </div>
      </div>

      <!-- ==================
           SECTION FORMS
      ================== -->
      <div class="section-forms-container">

        <!-- Section Form Card -->
        <div class="card card--section">
          <div class="card__header">
            <div class="card__header-icon card__header-icon--navy"></div>
            <span class="card__title">섹션 등록</span>
          </div>

          <div class="card__body">

            <!-- Parent Course Select -->
            <div class="form-field">
              <label class="form-label form-label--navy">PARENT COURSE</label>
              <div class="form-select-wrapper">
                <select id="section-course-select" class="form-select">
                  <option value="" disabled selected>코스를 선택하세요</option>
                </select>
                <div class="form-select-chevron"></div>
              </div>
            </div>

            <!-- Section Name -->
            <div class="form-field form-field--pb">
              <label class="form-label form-label--navy">SECTION NAME</label>
              <div class="form-input-wrapper">
                <input
                        id="section-title"
                        class="form-input"
                        type="text"
                        placeholder="섹션명을 입력하세요"
                />
              </div>
            </div>

            <!-- Section Note -->
            <div class="form-field form-field--pb">
              <label class="form-label form-label--navy">LECTURE NOTE</label>
              <div class="form-input-wrapper form-input-wrapper--textarea">
                <textarea
                        id="section-note"
                        class="form-textarea"
                        placeholder="강의 노트를 입력하세요"
                ></textarea>
              </div>
            </div>

            <!-- Submit Button -->
            <button class="btn btn--section" onclick="registerSection()">
              <span class="btn__label">섹션 등록하기</span>
            </button>

            <!-- 영상 등록 페이지 이동 버튼 -->
            <button class="btn btn--course" onclick="location.href='/admin/section/upload'">
              <span class="btn__label">영상 등록 페이지로 이동</span>
            </button>

          </div>
        </div>

        <!-- Director's Note -->
        <div class="directors-note">
          <div class="directors-note__icon"></div>
          <div class="directors-note__content">
            <span class="directors-note__title">Director's Note:</span>
            <p class="directors-note__body">
              모든 코스명은 수강생의 커리어 패스에 직접적으로 노출됩니다.
              직관적이면서도 권위 있는 명칭을 사용하십시오.
              등록 후 섹션 순서는 드래그 앤 드롭으로 조정 가능합니다.
            </p>
          </div>
        </div>

      </div>
      <!-- /section-forms-container -->

    </div>
    <!-- /forms-wrapper -->

  </div>
  <!-- /content-inner -->

</div>

</div>
<script>
  // 코스 등록
  function registerCourse() {
    const title = document.getElementById('course-title').value.trim();
    const description = document.getElementById('course-description').value.trim();
    const dueDate = document.getElementById('course-duedate').value;

    if (!title) { alert('코스명을 입력해주세요.'); return; }
    if (!description) { alert('코스 설명을 입력해주세요.'); return; }
    if (!dueDate || dueDate <= 0) { alert('수강 기간을 입력해주세요.'); return; }

    const formData = new FormData();
    formData.append('title', title);
    formData.append('description', description);
    formData.append('dueDate', dueDate);

    fetch('/admin/courses', {
      method: 'POST',
      body: formData
    })
    .then(response => {
      if (!response.ok) throw new Error('코스 등록 실패');
      return response.text();
    })
    .then(() => {
      alert('김부장의 칭찬 : 코스 등록 완료! 역시 믿을 수 있어.');
      document.getElementById('course-title').value = '';
      document.getElementById('course-description').value = '';
      document.getElementById('course-duedate').value = '';
      loadCourses();
    })
    .catch(() => alert('❌ 코스 등록에 실패했습니다.'));
  }

  // 섹션 등록
  function registerSection() {
    const courseId = document.getElementById('section-course-select').value;
    const title = document.getElementById('section-title').value.trim();
    const note = document.getElementById('section-note').value.trim();

    if (!courseId) { alert('코스를 선택해주세요.'); return; }
    if (!title) { alert('섹션명을 입력해주세요.'); return; }

    const formData = new FormData();
    formData.append('title', title);
    formData.append('note', note);

    fetch(`/admin/courses/${courseId}/sections`, {
      method: 'POST',
      body: formData
    })
    .then(response => {
      if (!response.ok) throw new Error('섹션 등록 실패');
      return response.json();
    })
    .then(() => {
      alert('김부장의 칭찬 : 섹션 등록 완료! 좋아, 계속 이 기세로 가.');
      document.getElementById('section-title').value = '';
      document.getElementById('section-note').value = '';
    })
    .catch(() => alert('❌ 섹션 등록에 실패했습니다.'));
  }

  // 코스 목록 불러오기 (섹션 셀렉트박스용)
  function loadCourses() {
    fetch('/admin/courses')
    .then(response => {
      if (!response.ok) return;
      return response.json();
    })
    .then(courses => {
      if (!courses) return;
      const select = document.getElementById('section-course-select');
      select.innerHTML = '<option value="" disabled selected>코스를 선택하세요</option>';
      courses.forEach(course => {
        const option = document.createElement('option');
        option.value = course.id;
        option.textContent = course.title;
        select.appendChild(option);
      });
    });
  }

  // 페이지 로드 시 코스 목록 불러오기
  document.addEventListener('DOMContentLoaded', loadCourses);
</script>

</body>
</html>
