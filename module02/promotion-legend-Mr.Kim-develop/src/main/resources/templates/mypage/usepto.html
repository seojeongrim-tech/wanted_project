<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>연차 신청 - 진급전설 김부장</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --navy-primary: #000666;
            --gold-accent: #735C00;
            --bg-gray: #F3F3F5;
            --border-color: #E5E7EB;
        }

        body {
            font-family: 'Manrope', 'Noto Sans KR', sans-serif;
            margin: 0;
            background-color: #F8F9FB;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .global-header {
            height: 64px;
            background: #FFFFFF;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-shrink: 0;
        }

        .content-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .global-sidebar {
            width: 256px;
            background: var(--bg-gray);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-profile {
            padding: 32px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .profile-img-container {
            width: 64px;
            height: 80px;
            margin: 0 auto 12px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background-color: #D1D5DB;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            color: #6B7280;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .menu-item:hover {
            background-color: rgba(255, 255, 255, 0.5);
            color: var(--navy-primary);
        }

        .sidebar-active {
            background-color: #FFFFFF !important;
            color: var(--navy-primary) !important;
            font-weight: 700 !important;
            border-right: 4px solid var(--navy-primary);
        }

        /* 하단 지원 영역 스타일 - 나의 정보 페이지와 동일하게 설정 */
        .sidebar-footer {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            margin-top: auto; /* 하단으로 밀어냄 */
        }

        .global-main {
            flex: 1;
            background: #F8F9FB;
            overflow-y: auto;
            position: relative;
        }

        /* 캘린더 그리드 스타일 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .day-selected {
            background-color: rgba(59, 130, 246, 0.1);
            border: 2px dashed #1A237E !important;
        }
        .day-range-edge {
            background-color: rgba(59, 130, 246, 0.2);
            border: 2px solid #1A237E !important;
        }
        .legend-watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 100px;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            pointer-events: none;
            z-index: 0;
            letter-spacing: -2px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #E5E7EB;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <header class="global-header">
        <a href="/" class="hover:opacity-80 transition-opacity">
            <h1 class="text-[#000666] font-extrabold text-xl tracking-tight">진급전설 김부장</h1>
        </a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="bg-[#303866] text-white text-xs px-4 py-2 rounded-sm font-medium hover:bg-[#1a2044] transition-colors">로그아웃</button>
        </form>
    </header>

    <div class="content-container">
        <aside class="global-sidebar">
            <div class="sidebar-profile">
                <div class="profile-img-container">
                    <img alt="User Avatar" class="w-full h-full object-cover" src="/images/profile.png"/>
                </div>
                <h3 class="text-lg font-bold text-[#000666]" th:text="${#strings.substring(user.name, 0, 1) + user.rank}">김부장</h3>
                <p class="text-[10px] text-gray-400 font-medium mt-1 uppercase" th:text="${user.name} + ', 믿겠네'">NAME, 믿겠네</p>
            </div>

            <nav class="flex-1 mt-4 overflow-y-auto custom-scrollbar">
                <ul class="space-y-1">
                    <li><a class="menu-item" href="/myPage/info"><svg class="w-5 h-5 mr-3 opacity-60" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>나의 정보</a></li>
                    <li><a class="menu-item" href="/myPage/courses"><svg class="w-5 h-5 mr-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>신청한 강의 조회</a></li>
                    <li><a class="menu-item sidebar-active" href="/myPage/attendance"><svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>출결 조회</a></li>
                    <li><a class="menu-item" href="/myPage/quizhistory"><svg class="w-5 h-5 mr-3 opacity-60" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>내가 푼 문제</a></li>
                    <li><a class="menu-item" href="/auth/reset-password"><svg class="w-5 h-5 mr-3 opacity-60" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>비밀번호 변경</a></li>
                    <li><a class="menu-item" href="/myPage/endjourney"><svg class="w-5 h-5 mr-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 12h3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>회원 탈퇴</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a class="flex items-center text-sm text-gray-500 hover:text-gray-800 transition-colors" href="mailto:support@legeno.com">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>지원
                </a>
            </div>
        </aside>

        <main class="global-main custom-scrollbar p-10">
            <section class="relative">
                <div class="flex justify-between items-start mb-12">
                    <div>
                        <p class="text-[13px] font-bold text-[#8B7323] tracking-[0.2em] mb-2">MANAGEMENT & RECOVERY</p>
                        <h2 class="text-4xl font-bold text-[#1A237E] mb-6">연차 신청</h2>
                        <p class="text-gray-600 text-[15px] leading-relaxed max-w-2xl">
                            전설적인 리더는 휴식의 가치를 압니다. 최고의 성과는 완벽한 충전에서 비롯됩니다.
                        </p>
                    </div>
                    <div class="bg-white border-l-4 border-[#8B7323] shadow-sm p-6 w-56">
                        <p class="text-gray-400 text-xs mb-2">잔여 연차</p>
                        <div class="flex items-baseline mb-4">
                            <span id="remaining-pto" class="text-4xl font-black text-[#1A237E]" th:text="${user.vacationCoupon}">15</span>
                            <span class="text-gray-400 text-lg ml-1">일</span>
                        </div>
                    </div>
                </div>

                <div class="flex gap-8 relative z-10">
                    <div class="flex-1 bg-white border border-gray-100 rounded-2xl p-10 shadow-sm">
                        <div class="flex items-center justify-between mb-10">
                            <div class="flex items-center gap-6">
                                <h3 id="calendar-title" class="text-2xl font-bold text-[#1A237E]">2024년 11월</h3>
                                <div class="flex gap-4">
                                    <button onclick="changeMonth(-1)" class="text-gray-400 hover:text-[#1A237E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
                                    <button onclick="changeMonth(1)" class="text-gray-400 hover:text-[#1A237E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
                                </div>
                            </div>
                            <div class="flex gap-3 text-[10px] font-bold">
                                <div class="flex items-center gap-1.5 px-2.5 py-1 bg-gray-50 rounded-full"><div class="w-2 h-2 rounded-full bg-[#5C8D40]"></div>출근</div>
                                <div class="flex items-center gap-1.5 px-2.5 py-1 bg-gray-50 rounded-full"><div class="w-2 h-2 rounded-full bg-[#EAB308]"></div>지각</div>
                                <div class="flex items-center gap-1.5 px-2.5 py-1 bg-gray-50 rounded-full"><div class="w-2 h-2 rounded-full bg-[#BA1A1A]"></div>결근</div>
                                <div class="flex items-center gap-1.5 px-2.5 py-1 bg-gray-50 rounded-full"><div class="w-2 h-2 rounded-full bg-[#60A5FA]"></div>공결</div>
                            </div>
                        </div>
                        <div class="calendar-grid text-center mb-6">
                            <div class="text-[10px] font-bold text-gray-300 py-2 uppercase tracking-widest">sun</div>
                            <div class="text-[10px] font-bold text-gray-300 py-2 uppercase tracking-widest">mon</div>
                            <div class="text-[10px] font-bold text-gray-300 py-2 uppercase tracking-widest">tue</div>
                            <div class="text-[10px] font-bold text-gray-300 py-2 uppercase tracking-widest">wed</div>
                            <div class="text-[10px] font-bold text-gray-300 py-2 uppercase tracking-widest">thu</div>
                            <div class="text-[10px] font-bold text-gray-300 py-2 uppercase tracking-widest">fri</div>
                            <div class="text-[10px] font-bold text-gray-300 py-2 uppercase tracking-widest">sat</div>
                        </div>
                        <div id="calendar-body" class="calendar-grid gap-4"></div>
                    </div>

                    <div class="w-80 flex flex-col gap-4">
                        <div class="bg-[#0D1245] rounded-2xl p-8 text-white shadow-xl">
                            <div class="flex items-center gap-2 mb-8">
                                <svg class="w-5 h-5 text-[#8B7323]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                                <h4 class="text-[11px] font-bold text-[#8B7323] uppercase tracking-widest">애플리케이션 요약</h4>
                            </div>
                            <div class="mb-6">
                                <label class="block text-[11px] text-gray-400 mb-2">선택된 날짜</label>
                                <p id="summary-date-range" class="text-lg font-semibold tracking-tight">날짜를 선택하세요</p>
                            </div>
                            <div class="mb-8">
                                <label class="block text-[11px] text-gray-400 mb-2">사용 연차</label>
                                <div class="flex items-baseline">
                                    <span id="summary-count" class="text-4xl font-black text-[#8B7323]">0</span>
                                    <span class="text-sm ml-1 text-gray-300">일</span>
                                </div>
                            </div>
                            <div class="mb-6">
                                <label class="block text-[11px] text-gray-400 mb-2">사유</label>
                                <select id="pto-purpose" class="w-full bg-[#1e2a5a] border-none rounded py-3 px-4 text-sm focus:ring-1 focus:ring-[#8B7323] text-white">
                                    <option value="SELF_IMPROVEMENT">자기계발</option>
                                    <option value="SICK">병가</option>
                                    <option value="ETC">기타</option>
                                </select>
                            </div>
                            <div class="mb-8">
                                <textarea id="pto-detail" class="w-full bg-[#1e2a5a] border-none rounded py-4 px-4 text-sm h-24 placeholder-gray-500 focus:ring-1 focus:ring-[#8B7323] text-white" placeholder="상세 사유를 입력하십시오"></textarea>
                            </div>
                            <button onclick="submitPTO()" class="w-full bg-[#8B7323] hover:bg-[#A68E3C] transition-colors text-white py-4 rounded font-bold flex items-center justify-center gap-2">
                                신청하기
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="legend-watermark">LEGEND</div>
            </section>
        </main>
    </div>
</div>

<script th:inline="javascript">
    /* JavaScript 로직은 이전과 동일 (캘린더 렌더링 및 PTO 신청 처리) */
    const rawAttendanceData = /*[[${attendanceList}]]*/ [];
    const attendanceMap = {};

    if (rawAttendanceData && rawAttendanceData.length > 0) {
        rawAttendanceData.forEach(item => {
            if (item.targetDate) {
                const d = new Date(item.targetDate);
                if(!isNaN(d.getTime())) {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    const normalizedKey = `${y}-${m}-${day}`;
                    const hours = String(d.getHours()).padStart(2, '0');
                    const minutes = String(d.getMinutes()).padStart(2, '0');
                    item.displayTime = `${hours}:${minutes}`;
                    attendanceMap[normalizedKey] = item;
                }
            }
        });
    }

    let currentViewDate = new Date();
    let selectedDates = [];

    function renderCalendar() {
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const calendarBody = document.getElementById('calendar-body');
        calendarBody.innerHTML = '';

        for (let i = 0; i < firstDay; i++) {
            calendarBody.innerHTML += `<div class="h-24"></div>`;
        }

        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

        for (let i = 1; i <= lastDate; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const isToday = (dateStr === todayStr);
            const isSelected = selectedDates.includes(dateStr);
            const isEdge = selectedDates.length > 0 && (selectedDates[0] === dateStr || selectedDates[selectedDates.length - 1] === dateStr);
            const record = attendanceMap[dateStr];

            let bgClass = "bg-white text-[#1A237E]";
            let borderClass = "border border-gray-100";
            if (isEdge) {
                bgClass = "day-range-edge font-bold";
            } else if (isSelected) {
                bgClass = "day-selected font-bold";
            } else if (isToday) {
                borderClass = "ring-2 ring-[#1A237E] ring-inset relative";
            }

            let recordHtml = '';
            if (record) {
                const timeStr = (record.status === 'PRESENT' || record.status === 'LATE') && record.displayTime !== '00:00' ? `<span class="opacity-70 ml-1">${record.displayTime}</span>` : '';
                if (record.status === 'PRESENT') recordHtml = `<div class="bg-[#F0F8EC] text-[#5C8D40] text-[9px] p-1 rounded mt-1 border-l-2 border-[#5C8D40] truncate">출근${timeStr}</div>`;
                else if (record.status === 'LATE') recordHtml = `<div class="bg-[#FFFBEB] text-[#735C00] text-[9px] p-1 rounded mt-1 border-l-2 border-[#735C00] truncate">지각${timeStr}</div>`;
                else if (record.status === 'ABSENT') recordHtml = `<div class="bg-[#FEF2F2] text-[#BA1A1A] text-[9px] p-1 rounded mt-1 border-l-2 border-[#BA1A1A]">결근</div>`;
                else if (record.status === 'EXCUSED') recordHtml = `<div class="bg-[#EFF6FF] text-[#60A5FA] text-[9px] p-1 rounded mt-1 border-l-2 border-[#60A5FA]">공결</div>`;
            }

            calendarBody.innerHTML += `
                <div onclick="handleDateClick('${dateStr}')" class="h-24 p-2 flex flex-col justify-between rounded-xl cursor-pointer transition-all shadow-sm ${bgClass} ${borderClass}">
                    <div class="flex justify-between items-start">
                        <span class="text-sm font-bold">${i}</span>
                        ${isToday ? '<span class="bg-[#1A237E] text-white text-[7px] font-bold px-1 py-0.5 rounded uppercase">Today</span>' : ''}
                    </div>
                    <div class="flex-1 w-full overflow-hidden">${recordHtml}</div>
                    <div class="flex justify-center">
                        ${selectedDates[0] === dateStr ? '<span class="text-[8px] font-bold">START</span>' : ''}
                        ${selectedDates.length > 1 && selectedDates[selectedDates.length-1] === dateStr ? '<span class="text-[8px] font-bold">END</span>' : ''}
                    </div>
                </div>`;
        }
    }

    function handleDateClick(dateStr) {
        const today = new Date();
        today.setHours(0,0,0,0);
        const clickedDate = new Date(dateStr);
        if (clickedDate < today) {
            alert("과거 날짜는 선택할 수 없습니다.");
            return;
        }
        if (selectedDates.length === 0 || selectedDates.length >= 2) {
            selectedDates = [dateStr];
        } else {
            const start = new Date(selectedDates[0]);
            const end = new Date(dateStr);
            if (end < start) {
                selectedDates = [dateStr];
            } else {
                selectedDates = [];
                let curr = new Date(start);
                while (curr <= end) {
                    selectedDates.push(curr.toISOString().split('T')[0]);
                    curr.setDate(curr.getDate() + 1);
                }
            }
        }
        updateSummary();
        renderCalendar();
    }

    function updateSummary() {
        const count = selectedDates.length;
        document.getElementById('summary-count').innerText = count;
        const rangeText = count === 0 ? "날짜를 선택하세요" : (count === 1 ? selectedDates[0] : `${selectedDates[0]} — ${selectedDates[count - 1]}`);
        document.getElementById('summary-date-range').innerText = rangeText;
    }

    function changeMonth(offset) {
        currentViewDate.setMonth(currentViewDate.getMonth() + offset);
        renderCalendar();
    }

    async function submitPTO() {
        if (selectedDates.length === 0) {
            alert("연차를 신청할 날짜를 선택해 주세요.");
            return;
        }
        const remaining = parseInt(document.getElementById('remaining-pto').innerText);
        if (selectedDates.length > remaining) {
            alert("잔여 연차가 부족합니다.");
            return;
        }
        const data = {
            purpose: document.getElementById('pto-purpose').value,
            detailPurpose: document.getElementById('pto-detail').value,
            dateList: selectedDates
        };
        try {
            const response = await fetch('/myPage/PTOApply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                alert("연차 신청이 정상적으로 완료되었습니다.");
                location.reload();
            } else {
                alert("저장 중 오류가 발생했습니다.");
            }
        } catch (e) {
            console.error(e);
            alert("서버 통신 오류가 발생했습니다.");
        }
    }

    renderCalendar();
</script>
</body>
</html>
