<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판</title>
    <link rel="stylesheet" href="/css/board/freeboard.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="portal-title" th:text="${isAdmin} ? '관리자 포털' : '임원 포털'">임원 포털</div>

        <div class="profile-box">
            <div class="profile-img"></div>
            <h3>김부장</h3>
            <p>김부장, 수석 이사</p>
        </div>

        <nav class="side-nav">
            <th:block th:if="${isAdmin}">
                <a th:href="@{/myPage/info}" class="nav-item">마이페이지</a>
                <a th:href="@{/user/enrollments/list}" class="nav-item">수강신청</a>
                <a th:href="@{/questionboard/user/questionboard}" class="nav-item">문제게시판</a>
                <a th:href="@{/freeboard/user/freeboard}" class="nav-item">자유게시판</a>
                <a th:href="@{/admin/locked-users}" class="nav-item">수강생 계정 관리</a>
                <a th:href="@{/admin/attendance}" class="nav-item">수강생 출결 관리</a>
                <a th:href="@{/admin/course/section}" class="nav-item">강의 및 코스 등록</a>
                <a th:href="@{/freeboard/admin/freeboard}"
                   th:class="${pageType == 'admin'} ? 'nav-item active' : 'nav-item'">
                    자유게시판 관리
                </a>
                <a th:href="@{/questionboard/admin/questionboard}" class="nav-item">문제게시판 관리</a>
            </th:block>

            <th:block th:unless="${isAdmin}">
                <a th:href="@{/myPage/info}" class="nav-item">마이페이지</a>
                <a th:href="@{/user/enrollments/list}" class="nav-item">수강신청</a>
                <a th:href="@{/freeboard/user/freeboard}"
                   th:class="${pageType == 'user'} ? 'nav-item active' : 'nav-item'">
                    자유게시판
                </a>
                <a th:href="@{/questionboard/user/questionboard}" class="nav-item">문제게시판</a>
            </th:block>
        </nav>
    </aside>

    <main class="content">

        <header class="top-header">
            <button type="button"
                    class="home-title-btn"
                    onclick="location.href='/'">
                진급전설 김부장
            </button>
        </header>

        <section class="freeboard-wrap">

            <section class="board-hero">
                <p class="board-subtitle">COMMUNICATION HUB</p>
                <h1 class="board-title">자유게시판</h1>
                <p class="board-desc">
                    부장님의 인사이트와 동료들의 성공 노하우가 공유되는 공간입니다.<br>
                    품격 있는 비즈니스 매너를 준수해 주세요.
                </p>
                <div class="board-hero-watermark">LEGEND</div>
            </section>

            <section class="board-toolbar">
                <div class="filter-area">
                    <button type="button" id="allBtn" class="filter-btn active">전체글</button>
                    <button type="button" id="mineBtn" class="filter-btn">내가 쓴 글</button>
                </div>

                <div class="write-area">
                    <button type="button" class="write-btn" id="writeBtn">
                        글쓰기
                    </button>
                </div>
            </section>

            <section class="board-table-wrap">
                <div class="board-table-scroll">
                    <table class="board-table">
                        <colgroup>
                            <col class="col-no">
                            <col class="col-title">
                            <col class="col-author">
                            <col class="col-views">
                            <col class="col-date">
                        </colgroup>
                        <thead>
                        <tr>
                            <th>NO.</th>
                            <th>SUBJECT / TITLE</th>
                            <th>AUTHOR</th>
                            <th>VIEWS</th>
                            <th>DATE</th>
                        </tr>
                        </thead>
                        <tbody id="postTableBody">
                        <tr>
                            <td colspan="5" class="empty">게시글을 불러오는 중입니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="pagination-area">
                <button type="button" class="page-btn">&laquo;</button>
                <button type="button" class="page-btn">&lsaquo;</button>
                <button type="button" class="page-btn active">1</button>
                <button type="button" class="page-btn">2</button>
                <button type="button" class="page-btn">3</button>
                <button type="button" class="page-btn">4</button>
                <button type="button" class="page-btn">5</button>
                <button type="button" class="page-btn">&rsaquo;</button>
                <button type="button" class="page-btn">&raquo;</button>
            </section>

        </section>

    </main>
</div>

<script th:inline="javascript">
    const pageType = /*[[${pageType}]]*/ "user";
    const boardBasePath = pageType === "admin"
        ? "/freeboard/admin/freeboard"
        : "/freeboard/user/freeboard";

    document.addEventListener("DOMContentLoaded", function () {
        const allBtn = document.getElementById("allBtn");
        const mineBtn = document.getElementById("mineBtn");
        const writeBtn = document.getElementById("writeBtn");

        if (allBtn) {
            allBtn.addEventListener("click", function () {
                loadPosts("all");
            });
        }

        if (mineBtn) {
            mineBtn.addEventListener("click", function () {
                loadPosts("mine");
            });
        }

        if (writeBtn) {
            writeBtn.addEventListener("click", function () {
                location.href = boardBasePath + "/freeboard-write";
            });
        }

        if (document.getElementById("postTableBody")) {
            loadPosts("all");
        }
    });

    function loadPosts(filter) {
        fetch(`${boardBasePath}/posts?filter=${filter}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error("게시글 목록을 불러오지 못했습니다.");
                }
                return response.json();
            })
            .then(posts => {
                renderPosts(posts);
                changeActiveButton(filter);
            })
            .catch(error => {
                console.error(error);
                document.getElementById("postTableBody").innerHTML = `
                    <tr>
                        <td colspan="5" class="empty">게시글을 불러오는 중 오류가 발생했습니다.</td>
                    </tr>
                `;
            });
    }

    function renderPosts(posts) {
        const tbody = document.getElementById("postTableBody");
        tbody.innerHTML = "";

        if (!posts || posts.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="empty">게시글이 없습니다.</td>
                </tr>
            `;
            return;
        }

        posts.forEach((post, index) => {
            tbody.insertAdjacentHTML("beforeend", `
                <tr class="post-row" data-post-id="${post.id}">
                    <td class="td-no">${posts.length - index}</td>
                    <td class="td-title">
                        <span class="title-text">${post.title}</span>
                    </td>
                    <td class="td-author">${post.authorName}</td>
                    <td class="td-views">${post.viewCount}</td>
                    <td class="td-date">${post.createdAt}</td>
                </tr>
            `);
        });

        document.querySelectorAll(".post-row").forEach(row => {
            row.addEventListener("click", function () {
                const postId = this.dataset.postId;
                location.href = `${boardBasePath}/${postId}`;
            });
        });
    }

    function changeActiveButton(filter) {
        const allBtn = document.getElementById("allBtn");
        const mineBtn = document.getElementById("mineBtn");

        if (allBtn) {
            allBtn.classList.toggle("active", filter === "all");
        }
        if (mineBtn) {
            mineBtn.classList.toggle("active", filter === "mine");
        }
    }
</script>

</body>
</html>
