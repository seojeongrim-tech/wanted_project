<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 자유게시판</title>
    <link rel="stylesheet" href="/css/board/admin-freeboard.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="portal-title">임원 포털</div>

        <div class="profile-box">
            <div class="profile-img"></div>
            <h3>김부장</h3>
            <p>김부장, 수석 이사</p>
        </div>

        <button type="button" onclick="location.href='/myPage/info'">마이페이지</button>
        <button type="button" onclick="location.href='/user/enrollments/list'">수강신청</button>
        <button type="button" onclick="location.href='/questionboard/user/questionboard'">문제게시판</button>
        <button type="button" onclick="location.href='/freeboard/user/freeboard'">자유게시판</button>

        <button type="button" onclick="location.href='/admin/locked-users'">수강생 계정 관리</button>
        <button type="button" onclick="location.href='/admin/attendance'">수강생 출결 관리</button>
        <button type="button" onclick="location.href='/admin/course/section'">강의 및 코스 등록</button>
        <button type="button" class="active" onclick="location.href='/freeboard/admin/freeboard'">자유게시판 관리</button>
        <button type="button" onclick="location.href='/questionboard/admin/questionboard'">문제게시판 관리</button>
    </aside>

    <main class="content">

        <header class="top-header">
            <button type="button" class="home-title-btn" onclick="location.href='/admin/main'">
                진급전설 김부장
            </button>
        </header>

        <section class="board-header">
            <p class="category">COMMUNICATION HUB</p>
            <h1>자유게시판</h1>
            <p class="description">
                부장님의 인사이트와 동료들의 성공 노하우가 공유되는 공간입니다.<br>
                품격 있는 비즈니스 매너를 준수해 주세요.
            </p>
        </section>

        <section class="board-list">
            <table>
                <thead>
                <tr>
                    <th>NO.</th>
                    <th>SUBJECT / TITLE</th>
                    <th>AUTHOR</th>
                    <th>VIEWS</th>
                    <th>DATE</th>
                </tr>
                </thead>

                <tbody id="postTableBody">
                <tr>
                    <td colspan="5" class="empty">게시글을 불러오는 중입니다.</td>
                </tr>
                </tbody>
            </table>
        </section>

    </main>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        loadPosts();
    });

    function loadPosts() {
        fetch('/freeboard/admin/freeboard/posts')
            .then(response => {
                if (!response.ok) {
                    throw new Error("게시글 목록을 불러오지 못했습니다.");
                }
                return response.json();
            })
            .then(posts => {
                renderPosts(posts);
            })
            .catch(error => {
                console.error(error);
                document.getElementById("postTableBody").innerHTML = `
                    <tr>
                        <td colspan="5" class="empty">게시글을 불러오는 중 오류가 발생했습니다.</td>
                    </tr>
                `;
            });
    }

    function renderPosts(posts) {
        const tbody = document.getElementById("postTableBody");
        tbody.innerHTML = "";

        if (!posts || posts.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="empty">게시글이 없습니다.</td>
                </tr>
            `;
            return;
        }

        posts.forEach((post, index) => {
            tbody.insertAdjacentHTML("beforeend", `
                <tr class="post-row" data-post-id="${post.id}">
                    <td class="td-no">${posts.length - index}</td>
                    <td class="title">${post.title}</td>
                    <td>${post.authorName}</td>
                    <td>${post.viewCount}</td>
                    <td>${post.createdAt}</td>
                </tr>
            `);
        });

        document.querySelectorAll(".post-row").forEach(row => {
            row.addEventListener("click", function () {
                const postId = this.dataset.postId;
                location.href = '/freeboard/admin/freeboard/' + postId;
            });
        });
    }
</script>

</body>
</html>
