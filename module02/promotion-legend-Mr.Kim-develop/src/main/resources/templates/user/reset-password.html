<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 진급전설 김부장</title>
    <link rel="stylesheet" th:href="@{/css/usercss/reset-password.css}">
    <link href="https://fonts.googleapis.com/css2?family=Alata&family=Manrope:wght@400;700;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- 상단 헤더 -->
<header class="rp-header">
    <div class="rp-header-inner">
        <span class="rp-header-brand">EXECUTIVE EDITORIAL</span>
        <span class="rp-header-badge">진급전설 김부장</span>
    </div>
</header>

<div class="rp-wrapper">
    <!-- 배경 워터마크 -->
    <div class="rp-bg-watermark">김</div>

    <div class="rp-card">
        <!-- 좌측 골드 액센트 바 -->
        <div class="rp-accent-bar"></div>

        <div class="rp-card-inner">
            <!-- 헤더 -->
            <div class="rp-card-header">
                <p class="rp-card-eyebrow">본인 확인</p>
                <h1 class="rp-card-title">비밀번호 재설정</h1>
                <p class="rp-card-desc">임원의 길을 계속하기 위해 본인 확인 후 비밀번호를<br>재설정하십시오.</p>
            </div>

            <!-- 서버 오류 메시지 -->
            <div th:if="${message}" class="rp-server-msg">
                <span th:text="${message}"></span>
            </div>

            <!-- 폼 -->
            <form th:action="@{/auth/reset-password}" method="post"
                  id="resetForm" onsubmit="return validatePassword()">

                <!-- 이메일 -->
                <div class="rp-field">
                    <label class="rp-label" for="email">이메일 주소</label>
                    <input class="rp-input" type="email" id="email" name="email"
                           required placeholder="">
                </div>

                <!-- 보안 질문 -->
                <div class="rp-field">
                    <label class="rp-label rp-label--gold" for="identifyQuestion">보안 질문 (식별문장)</label>
                    <select class="rp-input rp-select" id="identifyQuestion"
                            name="identifyQuestion" required>
                        <option value="" disabled selected></option>
                        <option value="가장 좋아하는 물건은?">가장 좋아하는 물건은?</option>
                        <option value="졸업한 초등학교 이름은?">졸업한 초등학교 이름은?</option>
                        <option value="어릴 적 별명은?">어릴 적 별명은?</option>
                    </select>
                </div>

                <!-- 답변 -->
                <div class="rp-field">
                    <label class="rp-label" for="identifyAnswer">답변</label>
                    <input class="rp-input" type="text" id="identifyAnswer"
                           name="identifyAnswer" required placeholder="">
                </div>

                <!-- 새 비밀번호 -->
                <div class="rp-field">
                    <label class="rp-label" for="newPassword">새 비밀번호</label>
                    <input class="rp-input" type="password" id="newPassword"
                           name="newPassword" required placeholder="">
                </div>

                <!-- 비밀번호 확인 (디자인에는 없으나 기능 유지) -->
                <div class="rp-field rp-field--hidden" id="confirmField">
                    <label class="rp-label" for="confirmPassword">비밀번호 확인</label>
                    <input class="rp-input" type="password" id="confirmPassword"
                           name="confirmPassword" placeholder="비밀번호 다시 입력"
                           onkeyup="checkPasswordMatch()">
                    <p id="passwordError"  class="rp-msg rp-msg--error">비밀번호가 일치하지 않습니다.</p>
                    <p id="passwordSuccess" class="rp-msg rp-msg--success">비밀번호가 일치합니다.</p>
                </div>

                <!-- 변경하기 버튼 -->
                <button type="submit" class="rp-submit-btn">
                    변경하기 (RESET PASSWORD) →
                </button>
            </form>

            <!-- 하단 링크 -->
            <div class="rp-footer-row">
                <a th:href="@{/auth/login}" class="rp-back-link">← 로그인으로 돌아가기</a>
                <span class="rp-info-icon" title="가입 시 등록한 보안 질문 정보로 본인 확인을 진행합니다.">ⓘ</span>
            </div>
        </div>
    </div>
</div>

<script>
    // 새 비밀번호 입력 시 확인 필드 노출
    document.getElementById('newPassword').addEventListener('input', function () {
        const field = document.getElementById('confirmField');
        field.style.display = this.value.length > 0 ? 'block' : 'none';
        if (this.value.length > 0) {
            document.getElementById('confirmPassword').required = true;
        }
    });

    function checkPasswordMatch() {
        const pwd        = document.getElementById('newPassword').value;
        const confirmPwd = document.getElementById('confirmPassword').value;
        const errorMsg   = document.getElementById('passwordError');
        const successMsg = document.getElementById('passwordSuccess');

        if (confirmPwd === '') {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            return;
        }
        if (pwd !== confirmPwd) {
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        } else {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'block';
        }
    }

    function validatePassword() {
        const pwd        = document.getElementById('newPassword').value;
        const confirmPwd = document.getElementById('confirmPassword').value;
        if (pwd !== confirmPwd) {
            alert('비밀번호가 일치하지 않습니다. 다시 확인해주세요.');
            document.getElementById('confirmPassword').focus();
            return false;
        }
        return true;
    }
</script>
</body>
</html>
