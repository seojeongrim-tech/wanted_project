<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>강의 수강신청 - 진급전설 김부장</title>
    <link rel="stylesheet" th:href="@{/css/enrollment/enrollmentList.css}" />
</head>
<body>

<!-- NAV -->
<nav class="nav">
    <div class="nav__left">
        <a th:href="@{/}" class="nav__logo">진급전설 김부장</a>
    </div>
    <div class="nav__right">
        <a th:href="@{/myPage/info}" class="nav__link">마이페이지</a>
        <form th:action="@{/logout}" method="post" style="display:inline; margin:0; padding:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="nav__logout">로그아웃</button>
        </form>
    </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar__label">전체 강의</div>
        <div class="sidebar__sub">전설의 경로</div>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- Header -->
        <div class="page-header">
            <div class="page-header__eyebrow">
                <span class="page-header__line"></span>
                <span class="page-header__eyebrow-text">새로운 기회</span>
            </div>
            <h1 class="page-header__title">강의 수강신청</h1>
            <p class="page-header__desc">전설적인 커리어의 다음 단계가 여기서 시작됩니다. 김부장님이 엄선한 강의로 승진 트랙을 가속하세요.</p>
        </div>



        <!-- Course List -->
        <div class="course-list" id="course-list">
            <!-- JS로 동적 렌더링 -->
        </div>

        <!-- Footer CTA -->
        <div class="footer-cta">
            <div class="footer-cta__icon"></div>
            <div class="footer-cta__title">공식 우수 수료증</div>
            <div class="footer-cta__desc">완료한 강의 하나하나가 전설적인 임원이 되는 길을 향한 한 걸음입니다. 이사진에 의해 검증됩니다.</div>
        </div>

    </main>
</div>

<script th:inline="javascript">
    // 현재 로그인 userId — 실제 구현 시 세션에서 가져와야 함
    const USER_ID = /*[[${#authentication.principal.userId}]]*/ null;

    let allCourses = [];

    // 코스 목록 불러오기
    async function loadCourses() {
        try {
            const res = await fetch('/user/courses');
            allCourses = await res.json();
            renderCourses(allCourses);
        } catch (e) {
            document.getElementById('course-list').innerHTML = '<p style="color:#94A3B8; padding:24px;">강의 목록을 불러오지 못했습니다.</p>';
        }
    }

    // 코스 카드 렌더링
    function renderCourses(courses) {
        const list = document.getElementById('course-list');
        if (!courses.length) {
            list.innerHTML = '<p style="color:#94A3B8; padding:24px;">등록된 강의가 없습니다.</p>';
            return;
        }

        list.innerHTML = courses.map(function(course) {
            var badgeHtml = course.dueDate > 0 ? '<div class="course-card__badge">' + course.dueDate + '일 과정</div>' : '';
            return '<div class="course-card" data-id="' + course.id + '">' +
                '<div class="course-card__body">' +
                '<div class="course-card__meta">' + badgeHtml + '</div>' +
                '<div class="course-card__title">' + course.title + '</div>' +
                '<div class="course-card__desc">' + (course.description || '김부장님이 엄선한 강의입니다.') + '</div>' +
                '<div class="course-card__btns">' +
                '<button class="course-card__btn--detail" onclick="location.href=\'/user/lectures/' + course.id + '\'">상세 보기</button>' +
                '<button class="course-card__btn" onclick="enroll(' + course.id + ')">수강신청</button>' +
                '</div>' +
                '</div>' +
                '</div>';
        }).join('');
    }

    // 트랙 필터 제거됨

    // 수강신청
    async function enroll(courseId) {
        try {
            const res = await fetch('/user/enrollments/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: USER_ID, courseId: courseId })
            });

            if (!res.ok) {
                const msg = await res.text();
                alert('수강신청 실패: ' + msg);
                return;
            }

            const data = await res.json();
            const enrollmentId = data.enrollmentId;

            if (data.alreadyEnrolled) {
                const go = confirm('이미 수강신청한 강의입니다.\n수강 페이지로 이동하시겠습니까?');
                if (go) window.location.href = `/user/enrollments/${enrollmentId}/watch`;
                return;
            }

            alert('수강신청이 완료되었습니다!');
            window.location.href = `/user/enrollments/${enrollmentId}/watch`;

        } catch (e) {
            alert('수강신청 중 오류가 발생했습니다.');
        }
    }

    document.addEventListener('DOMContentLoaded', loadCourses);
</script>
</body>
</html>
